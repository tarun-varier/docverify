services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docverify-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - docverify-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: docverify-backend
    ports:
      - "8000:8000"
    environment:
      - SECURITY_GATEWAY_URL=http://security:8002
      - SECURITY_GATEWAY_PATH=/scan
      - MODEL_SERVICE_URL=http://model:8001
      - MODEL_ANALYZE_PATH=/analyze
      - DATABASE_URL=postgresql://docverify:${POSTGRES_PASSWORD:-docverify_pass}@db:5432/docverify_db
      - LEDGER_RPC_URL=http://ledger:8545
      - LEDGER_CONTRACT_ADDRESS=${LEDGER_CONTRACT_ADDRESS:-}
    volumes:
      - ledger_shared:/shared:ro
    depends_on:
      security:
        condition: service_healthy
      model:
        condition: service_healthy
      db:
        condition: service_healthy
      ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - docverify-net
    restart: unless-stopped

  security:
    build:
      context: ./security
      dockerfile: Dockerfile
    container_name: docverify-security-gateway
    ports:
      - "8002:8002"
    environment:
      - MAX_FILE_SIZE_MB=10
      - ALLOWED_MIME_TYPES=application/pdf
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 2048m
    cpus: 1.5
    tmpfs:
      - /tmp:rw,nosuid,size=512m
    networks:
      - docverify-net
    restart: unless-stopped

  model:
    build:
      context: ./model
      dockerfile: Dockerfile
    container_name: docverify-ml-model
    ports:
      - "8001:8001"
    environment:
      # L5 narrative (model/pipeline/llm.py). Optional: the model service
      # starts and serves real scoring/anomalies with no dependency on this —
      # generate_underwriting_report() is wrapped in a try/except that
      # degrades to "AI underwriting summary unavailable" if ollama is
      # unreachable or the model hasn't finished pulling yet (see the
      # ollama-pull job below). Local dev without ollama still works.
      - OLLAMA_HOST=http://ollama:11434
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 1024m
    cpus: 1.0
    networks:
      - docverify-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: docverify-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=docverify
      # Dev default only. Override for any non-local use via a gitignored .env
      # (POSTGRES_PASSWORD=...) or the shell environment. See .env.example.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-docverify_pass}
      - POSTGRES_DB=docverify_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docverify -d docverify_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - docverify-net
    restart: unless-stopped

  ledger:
    build:
      context: .
      dockerfile: ledger/Dockerfile
    container_name: docverify-ledger
    ports:
      - "8545:8545"
    volumes:
      - ledger_shared:/shared
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"net_version\",\"params\":[],\"id\":1}' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docverify-net
    restart: unless-stopped

  # L5 LLM narrative backend. Resource cost: the qwen2.5:3b pull below is
  # ~2 GB on first run, and ollama needs a few GB of RAM headroom to serve
  # it. Nothing else in the stack depends on this service — `model` calls it
  # at request time and degrades gracefully if it's absent, still pulling,
  # or unreachable, so a laptop that can't afford the RAM can just
  # `docker compose up` everything except `ollama`/`ollama-pull`.
  ollama:
    image: ollama/ollama:latest
    container_name: docverify-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - docverify-net
    restart: unless-stopped

  # One-shot: pulls the exact model model/pipeline/llm.py calls
  # (ollama.chat(model="qwen2.5:3b", ...)) and exits. Re-running
  # `docker compose up` is a no-op once the model is cached in the
  # ollama_data volume.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: docverify-ollama-pull
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:3b"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - docverify-net
    restart: "no"

volumes:
  postgres_data:
    driver: local
  ledger_shared:
    driver: local
  ollama_data:
    driver: local

networks:
  docverify-net:
    driver: bridge